    function updateTime(){
    let date= new Date();
    let hours= date.getHours();
    hours= hours% 12;
    let min= date.getMinutes();
    let sec= date.getSeconds();

    let time= `${hours}: ${min}: ${sec}`;

    document.getElementById("clock").innerHTML= time;
    }

    setInterval(updateTime,1000);
